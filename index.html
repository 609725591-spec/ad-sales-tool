<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>智能售广助手</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --blue:#2563EB;--blue-bg:#EFF6FF;--green:#059669;--green-bg:#ECFDF5;
  --orange:#EA580C;--orange-bg:#FFF7ED;--purple:#7C3AED;--purple-bg:#F5F3FF;
  --red:#DC2626;--red-bg:#FEF2F2;--amber:#D97706;--amber-bg:#FFFBEB;
  --teal:#0D9488;--teal-bg:#F0FDFA;--pink:#DB2777;--pink-bg:#FDF2F8;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g800:#1F2937;--g900:#111827;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -2px rgba(0,0,0,.06);
  --r:12px;--r-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--g50);color:var(--g900);line-height:1.6;-webkit-font-smoothing:antialiased;font-size:14px;}
.container{max-width:1200px;margin:0 auto;padding:16px 20px 80px;}
/* ── Header ── */
.hdr{background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 50%,#2563EB 100%);border-radius:16px;padding:28px 32px 24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;}
.hdr::after{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(96,165,250,.1);}
.hdr h1{font-size:22px;font-weight:700;margin-bottom:4px;position:relative;z-index:1;}
.hdr p{font-size:13px;opacity:.8;position:relative;z-index:1;}
.hdr .meta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;position:relative;z-index:1;}
.hdr .meta span{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:2px 10px;border-radius:16px;font-size:11px;}
/* ── Login Screen ── */
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:300px;padding:40px 20px;}
.login-card{background:#fff;border-radius:16px;padding:40px;text-align:center;box-shadow:var(--shadow-md);max-width:420px;width:100%;}
.login-icon{font-size:48px;margin-bottom:12px;}
.login-card h2{font-size:20px;font-weight:700;margin-bottom:6px;}
.login-card p{font-size:13px;color:var(--g500);margin-bottom:20px;}
.login-form{display:flex;gap:8px;margin-bottom:12px;}
.login-input{flex:1;padding:12px 16px;border:2px solid var(--g200);border-radius:var(--r-sm);font-size:18px;font-weight:700;letter-spacing:4px;text-align:center;text-transform:uppercase;outline:none;transition:border .2s;}
.login-input:focus{border-color:var(--blue);}
.login-error{font-size:12px;color:var(--red);min-height:18px;margin-bottom:8px;}
.login-hint{font-size:11px;color:var(--g400);}
/* ── Dashboard ── */
.dash{display:none;}
.dash.active{display:block;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px;}
.stat-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-sm);padding:14px 16px;box-shadow:var(--shadow);}
.stat-card .label{font-size:11px;color:var(--g500);font-weight:600;letter-spacing:.3px;margin-bottom:2px;}
.stat-card .value{font-size:22px;font-weight:700;}
.stat-card .sub{font-size:11px;color:var(--g400);margin-top:2px;}
/* ── Filters ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.filter-chip{padding:5px 14px;border:1px solid var(--g200);border-radius:20px;font-size:12px;cursor:pointer;background:#fff;transition:all .15s;white-space:nowrap;}
.filter-chip:hover{border-color:var(--blue);color:var(--blue);}
.filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.filter-chip .count{font-weight:700;margin-left:3px;}
.xiaoer-search{padding:6px 12px;border:1px solid var(--g200);border-radius:20px;font-size:12px;outline:none;width:160px;}
.xiaoer-search:focus{border-color:var(--blue);}
/* ── Search Bar ── */
.search-bar{display:flex;gap:12px;padding:10px 16px;background:#fff;border-left:1px solid var(--g200);border-right:1px solid var(--g200);}
.search-box{display:flex;align-items:center;gap:6px;flex:1;}
.search-box label{font-size:12px;font-weight:600;color:var(--g500);white-space:nowrap;}
.search-input{flex:1;padding:6px 10px;border:1px solid var(--g200);border-radius:6px;font-size:12px;outline:none;transition:border-color .2s;font-family:monospace;}
.search-input:focus{border-color:var(--blue);}
/* ── Store List ── */
.store-list{background:#fff;border:1px solid var(--g200);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.store-header{display:grid;grid-template-columns:30px 1fr 80px 90px 80px 90px 60px;gap:8px;padding:10px 16px;background:var(--g100);font-size:11px;font-weight:700;color:var(--g500);letter-spacing:.3px;border-bottom:1px solid var(--g200);}
.store-header .sortable{cursor:pointer;display:inline-flex;align-items:center;gap:3px;user-select:none;transition:color .15s;}
.store-header .sortable:hover{color:var(--blue);}
.store-header .sortable .sort-icon{font-size:9px;opacity:.4;transition:opacity .15s;}
.store-header .sortable.active .sort-icon{opacity:1;color:var(--blue);}
.store-row{display:grid;grid-template-columns:30px 1fr 80px 90px 80px 90px 60px;gap:8px;padding:10px 16px;align-items:center;border-bottom:1px solid var(--g100);cursor:pointer;transition:background .1s;font-size:13px;}
.store-row:hover{background:var(--blue-bg);}
.store-row.store-dormant{opacity:0.45;background:var(--g50);}
.store-row.store-dormant:hover{opacity:0.7;background:var(--g100);}
.store-row .cb{width:16px;height:16px;accent-color:var(--blue);cursor:pointer;}
.store-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.store-name .cat{font-weight:400;color:var(--g400);font-size:11px;margin-left:4px;}
.tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;}
.tag-l1{color:#fff;}
.tag-l2{border:1px solid;background:#fff;}
.tag-ka{background:var(--amber-bg);color:var(--amber);border:1px solid #FDE68A;font-size:9px;padding:0 5px;}
.gmv-cell{font-weight:700;font-variant-numeric:tabular-nums;}
.pv-cell,.ad-cell{color:var(--g500);font-variant-numeric:tabular-nums;}
/* ── Store Detail Modal ── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:16px;max-width:800px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{padding:20px 24px 16px;border-bottom:1px solid var(--g200);}
.modal-hd h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.modal-hd .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.modal-body{padding:20px 24px;}
.modal-close{position:absolute;right:16px;top:16px;width:32px;height:32px;border-radius:50%;border:none;background:var(--g100);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--g200);}
/* ── Profile Card ── */
.profile-card{border-radius:var(--r-sm);padding:16px;margin-bottom:16px;border:1px solid;}
.profile-card h3{font-size:14px;font-weight:700;margin-bottom:6px;}
.profile-card .diag{font-size:13px;color:var(--g700);line-height:1.7;}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
.metric{background:rgba(255,255,255,.6);border-radius:6px;padding:8px;text-align:center;}
.metric .mv{font-size:16px;font-weight:700;}
.metric .ml{font-size:10px;color:var(--g500);}
/* ── Recommendation Card ── */
.rec-card{background:var(--blue-bg);border:1px solid #BFDBFE;border-radius:var(--r-sm);padding:16px;margin-bottom:16px;}
.rec-card h3{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:8px;}
.rec-prods{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.rec-prod{background:#fff;border:1px solid var(--g200);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;}
.rec-budget{font-size:13px;color:var(--g600);margin-bottom:4px;}
.rec-budget strong{color:var(--g900);}
.rec-roi{font-size:13px;color:var(--green);font-weight:600;}
/* ── One-pager ── */
.onepager{border:1px solid var(--g200);border-radius:var(--r-sm);padding:16px;margin-bottom:16px;}
.onepager h3{font-size:14px;font-weight:700;margin-bottom:10px;}
.script-block{margin-bottom:12px;}
.script-label{font-size:11px;font-weight:700;margin-bottom:4px;letter-spacing:.3px;}
.script-label.open{color:var(--blue);}
.script-label.close{color:var(--orange);}
.script-label.obj{color:var(--red);}
.script-text{font-size:13px;color:var(--g700);line-height:1.7;padding:10px 14px;background:var(--g50);border-radius:var(--r-sm);border-left:3px solid var(--blue);}
.script-text.cl{border-left-color:var(--orange);}
.script-text.ob{border-left-color:var(--red);}
.script-text.dt{border-left-color:var(--green);}
.script-label.data{color:var(--green);}
/* ── Enhanced One-pager ── */
.diag-points{list-style:none;margin:0;padding:0;}
.diag-points li{position:relative;padding-left:16px;font-size:13px;color:var(--g700);line-height:1.9;}
.diag-points li::before{content:'';position:absolute;left:0;top:10px;width:6px;height:6px;border-radius:50%;}
.combo-logic{font-size:13px;color:var(--g700);line-height:1.7;padding:10px 14px;background:rgba(255,255,255,.7);border-radius:8px;margin-top:8px;}
.combo-logic strong{color:var(--g900);}
.alt-plan{background:var(--orange-bg);border:1px solid #FED7AA;border-radius:var(--r-sm);padding:14px;margin-bottom:16px;}
.alt-plan .alt-tag{font-size:10px;font-weight:700;color:#fff;background:var(--orange);padding:2px 8px;border-radius:4px;margin-bottom:6px;display:inline-block;}
.product-matrix{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.pm-item{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;border:1px solid;}
.pm-must{background:var(--blue-bg);color:var(--blue);border-color:#BFDBFE;}
.pm-upsell{background:var(--green-bg);color:var(--green);border-color:#A7F3D0;}
.pm-cond{background:var(--amber-bg);color:var(--amber);border-color:#FDE68A;}
.pm-none{background:var(--g50);color:var(--g400);border-color:var(--g200);}
.upsell-path{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--r-sm);padding:12px 16px;font-size:13px;color:#92400E;line-height:1.7;margin-bottom:16px;}
.upsell-path strong{color:#78350F;}
/* ── Case Reference ── */
.case-section{margin-bottom:16px;}
.case-section h3{font-size:14px;font-weight:700;margin-bottom:10px;}
.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
.case-card{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r-sm);padding:10px 12px;font-size:12px;transition:border-color .15s;}
.case-card:hover{border-color:var(--blue);}
.case-card .case-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.case-card .case-city{font-weight:700;color:var(--g900);}
.case-card .case-score{font-size:10px;background:var(--amber-bg);color:var(--amber);padding:1px 6px;border-radius:4px;font-weight:600;}
.case-card .case-products{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:4px;}
.case-card .case-highlight{font-size:11px;color:var(--g600);line-height:1.5;}
.case-card .case-metrics{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.case-card .case-metric{font-size:10px;background:#fff;border:1px solid var(--g200);border-radius:4px;padding:1px 5px;color:var(--green);font-weight:600;}
.export-bar{display:flex;gap:8px;margin-bottom:16px;}
.export-bar .btn{font-size:12px;}
/* ── Tag Legend ── */
.legend-toggle{padding:3px 10px;border:1px solid var(--g200);border-radius:14px;font-size:11px;cursor:pointer;background:#fff;color:var(--g500);transition:all .15s;white-space:nowrap;}
.legend-toggle:hover{border-color:var(--blue);color:var(--blue);}
.legend-panel{display:none;background:#fff;border:1px solid var(--g200);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);}
.legend-panel.show{display:block;}
.legend-panel h4{font-size:12px;font-weight:700;color:var(--g700);margin-bottom:8px;letter-spacing:.3px;}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px;}
.legend-item{display:flex;align-items:flex-start;gap:6px;font-size:12px;line-height:1.5;padding:4px 0;}
.legend-item .ltag{flex-shrink:0;font-size:10px;font-weight:600;padding:1px 7px;border-radius:8px;white-space:nowrap;margin-top:1px;}
.legend-item .ldesc{color:var(--g600);}
/* ── Attack Target Panel ── */
.attack-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--blue);z-index:150;transform:translateY(calc(100% - 44px));transition:transform .3s;box-shadow:0 -4px 16px rgba(0,0,0,.1);}
.attack-panel.open{transform:translateY(0);}
.attack-toggle{padding:10px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.attack-toggle h4{font-size:14px;font-weight:700;color:var(--blue);}
.attack-toggle .badge{background:var(--blue);color:#fff;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-left:6px;}
.attack-body{padding:0 20px 16px;max-height:300px;overflow-y:auto;}
.attack-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--g100);font-size:13px;}
.attack-item .remove{color:var(--red);cursor:pointer;font-size:11px;padding:2px 8px;}
.attack-summary{padding:10px 0;font-size:13px;color:var(--g600);border-top:1px solid var(--g200);margin-top:8px;display:flex;justify-content:space-between;}
.attack-actions{display:flex;gap:8px;margin-top:10px;}
.btn{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:#1D4ED8;}
.btn-outline{background:#fff;color:var(--g700);border-color:var(--g300);}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm{padding:4px 10px;font-size:11px;}
/* ── Misc ── */
.loading{text-align:center;padding:40px;color:var(--g400);font-size:14px;}
.empty{text-align:center;padding:40px;color:var(--g400);}
.back-btn{display:inline-flex;align-items:center;gap:4px;color:var(--blue);font-size:13px;cursor:pointer;margin-bottom:12px;font-weight:600;}
.back-btn:hover{text-decoration:underline;}
.assign-label{background:var(--red-bg);color:var(--red);font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700;margin-left:4px;}
/* ── Toolbar & Pagination ── */
.store-toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#fff;border:1px solid var(--g200);border-radius:var(--r-sm) var(--r-sm) 0 0;border-bottom:none;}
.store-toolbar .info{font-size:12px;color:var(--g500);}
.store-toolbar .info strong{color:var(--g900);}
.store-toolbar .actions{display:flex;gap:6px;}
.pager{display:flex;justify-content:center;align-items:center;gap:8px;padding:12px 16px;background:#fff;border:1px solid var(--g200);border-radius:0 0 var(--r-sm) var(--r-sm);border-top:none;}
.pager .pg-btn{padding:4px 12px;border:1px solid var(--g200);border-radius:4px;font-size:12px;cursor:pointer;background:#fff;color:var(--g700);transition:all .15s;}
.pager .pg-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);}
.pager .pg-btn:disabled{opacity:.4;cursor:default;}
.pager .pg-info{font-size:12px;color:var(--g500);min-width:100px;text-align:center;}
@media(max-width:768px){
  .container{padding:12px 12px 80px;}
  .store-header,.store-row{grid-template-columns:24px 1fr 60px 70px;font-size:12px;}
  .store-header>:nth-child(n+5),.store-row>:nth-child(n+5){display:none;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .modal{margin:10px;}
  .metrics-row{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="hdr">
    <h1>智能售广助手</h1>
    <p>门店画像驱动的商业化方案生成工具 · 选店 → 看画像 → 拿方案</p>
    <div class="meta"><span>数据更新至2026年6月25日</span></div>
  </div>

  <!-- Login Screen -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <h2>服务商登录</h2>
      <p>请输入您的6位访问码，查看您所属服务商的门店数据</p>
      <div class="login-form">
        <input type="text" class="login-input" id="loginInput" placeholder="输入6位访问码" maxlength="6" autocomplete="off" spellcheck="false">
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">登 录</button>
      </div>
      <div class="login-error" id="loginError"></div>
      <div class="login-hint">访问码由管理员分发，如未收到请联系您的渠道经理</div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dash" id="dash">
    <!-- Logout -->
    <div class="back-btn" id="backBtn">🔓 退出登录</div>
    <!-- Stats -->
    <div class="stat-row" id="statRow"></div>
    <!-- Xiaoer + Filters -->
    <div class="filters" id="filterBar"></div>
    <!-- Store List -->
    <div class="store-list" id="storeList"></div>
  </div>
</div>

<!-- Store Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" style="position:relative;">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Attack Target Panel -->
<div class="attack-panel" id="attackPanel">
  <div class="attack-toggle" id="attackToggle">
    <h4>攻坚清单 <span class="badge" id="attackCount">0</span></h4>
    <span style="font-size:12px;color:var(--g500);" id="attackArrow">▲</span>
  </div>
  <div class="attack-body" id="attackBody"></div>
</div>

<script>
// ═══════════════════════════════════════════
// Data & State
// ═══════════════════════════════════════════
let providerIndex = [];
let currentProvider = null;
let currentStores = [];
let filteredStores = [];
let attackTargets = new Map(); // storeId -> store
let activeFilters = { l1: null, l2: null, xiaoer: '', priority: null, dingzhan: null, storeId: '', merchantPid: '' };
let currentSort = { field: null, dir: null }; // field: 'g'|'se', dir: 'asc'|'desc'
let currentPage = 0;
const PAGE_SIZE = 50;

const PRIORITY_LABELS = { P0: 'P0·高优', P1: 'P1·重点' };
const PRIORITY_COLORS = { P0: '#DC2626', P1: '#EA580C' };

const L1_DESC = {
  trading_big:'月GMV≥5000且未投广告，口碑好但缺乏线上推广',
  ad_active:'已有广告在投，可追售补全产品组合',
  traffic_mine:'搜索曝光≥500但GMV为0，有流量无转化',
  potential:'有少量GMV但未投广告，处于成长期',
  cps_active:'有CPS收入但未投广告，可转化为广告客户',
  dormant:'各项指标较低，暂不建议投放（已从列表过滤）'
};
const L2_DESC = {

function getCasesForStore(s) {
  const c2 = (s.c2 || '').toLowerCase();
  // Score each case: same subcat=3, same cat=2, related=1
  return CASE_LIBRARY.map(c => {
    let priority = 0;
    if (c.subcat && c2.includes(c.subcat) || c.subcat && c.subcat.includes(c2)) priority = 3;
    else if (c.cat && c2.includes(c.cat) || c.cat && c.cat.includes(c2)) priority = 2;
    // Category relationships
    const related = {'火锅':['火锅'],'烧烤':['烧烤'],'小龙虾':['水产海鲜','小龙虾'],'海鲜':['水产海鲜','海鲜'],'中餐':['中餐','中餐','江浙菜','川菜','安徽菜'],'水产海鲜':['水产海鲜','小龙虾','海鲜','海鲜辽菜','海鲜自助']};
    for (const [key, vals] of Object.entries(related)) {
      if (c2.includes(key) && vals.some(v => c.subcat.includes(v) || c.cat.includes(v))) priority = Math.max(priority, 1);
    }
    return {...c, priority};
  }).filter(c => c.priority > 0).sort((a,b) => b.priority - a.priority).slice(0, 4);
}

  const related = {'火锅':'火锅','烧烤':'烧烤','小龙虾':'小龙虾','海鲜':'水产海鲜','水产':'水产海鲜','中餐':'中餐','川菜':'中餐','粤菜':'中餐','江浙菜':'中餐'};

      if (c2.includes(key)) { catKey = val; break; }
    }
  }
  const general = SCRIPT_LIBRARY.general;
  const specific = catKey ? SCRIPT_LIBRARY[catKey] : null;
  return {
    open: [...(specific?.open || []), ...general.open].slice(0, 4),
    close: [...(specific?.close || []), ...general.close].slice(0, 3),
    obj: [...(specific?.obj || []), ...general.obj].slice(0, 3),
    catName: catKey || '通用'
  };
}

function getDingzhanForStore(s) {
  const city = s.ct || '';
  const c2 = s.c2 || '';
  const cityData = DINGZHAN_DATA[city];
  if (!cityData) return null;
  // Smart category matching: for ambiguous categories, use store name to refine
  let dzCats = DZ_CAT_MAP[c2] || [];
  if (dzCats.length === 0) {
    // No direct mapping, try name-based matching
    const name = s.n || '';
    if (name.includes('烤')) dzCats = ['烧烤'];
    else if (name.includes('火锅')) dzCats = ['四川火锅','潮汕火锅','涮羊肉'];
    else if (name.includes('龙虾') || name.includes('小龙虾')) dzCats = ['水产海鲜'];
    else if (name.includes('海鲜')) dzCats = ['水产海鲜'];
    else if (name.includes('寿司') || name.includes('日料') || name.includes('日本')) dzCats = ['日本料理'];
  } else if (c2 === '自助餐' || c2 === '韩式自助' || c2 === '烤涮一体自助') {
    // For buffet categories, refine based on store name
    const name = s.n || '';
    if (name.includes('烤肉') || name.includes('烤')) dzCats = ['烧烤'];
    else if (name.includes('火锅')) dzCats = ['四川火锅','潮汕火锅','涮羊肉'];
    else if (name.includes('海鲜')) dzCats = ['水产海鲜'];
    else dzCats = ['本地中餐_1']; // Default buffet to local cuisine
  }
  if (dzCats.length === 0) return null;
  // Find matching available categories
  const matchedAvailable = dzCats.filter(c => cityData.available.includes(c));
  const matchedExpiring = cityData.expiring.filter(e => dzCats.includes(e.cat));
  if (matchedAvailable.length === 0 && matchedExpiring.length === 0) return null;
  // ── 严格资质筛选：顶展是稀缺高价资源，只推荐最有价值的门店 ──
  const isSKA = s.ka === 'SKA';
  const isKA = s.ka === 'KA';
  const isP0 = s.p === 'P0';
  const gmv = s.g || 0;
  const se = s.se || 0;
  const dp = s.dp || 0;
  // 必须有可直接抢的类目（不能只是即将到期）
  const hasDirectAvail = matchedAvailable.length > 0;
  let qualified = false;
  if (isSKA) {
    // SKA: GMV>=2000 且 搜索曝光>=300
    qualified = gmv >= 2000 && se >= 300;
  } else if (isKA) {
    // KA: GMV>=3000 且 搜索曝光>=500
    qualified = gmv >= 3000 && se >= 500;
  } else if (isP0) {
    // P0(非KA): GMV>=5000 且 搜索曝光>=800 且 详情页PV>=50
    qualified = gmv >= 5000 && se >= 800 && dp >= 50;
  }
  if (!qualified || !hasDirectAvail) return null;
  return {
    city, available: matchedAvailable, expiring: matchedExpiring,
    totalAvail: cityData.available.length, region: cityData.region
  };
}

function fmtNum(n) { return n >= 10000 ? (n/10000).toFixed(1)+'万' : n >= 1000 ? (n/1000).toFixed(1)+'K' : (Math.round(n * 100) / 100).toString(); }
function fmtMoney(n) { return n === 0 ? '0' : '¥' + fmtNum(n); }
function gmvLabel(g) {
  if (g === 0 || !g) return '<span style="color:var(--g400);">0</span>';
  const t = window._gmvThresholds || { low: 0, high: 0 };
  if (g >= t.high) return '<span style="color:var(--red);font-weight:700;">高</span>';
  if (g >= t.low) return '<span style="color:var(--orange);font-weight:600;">中</span>';
  return '<span style="color:var(--g500);">低</span>';
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ═══════════════════════════════════════════
// Login / Logout
// ═══════════════════════════════════════════
function doLogin() {
  const input = document.getElementById('loginInput');
  const errorEl = document.getElementById('loginError');
  const code = input.value.trim().toUpperCase();
  if (code.length !== 6) { errorEl.textContent = '请输入6位访问码'; return; }
  const sp = providerIndex.find(p => p.code === code);
  if (!sp) { errorEl.textContent = '访问码无效，请联系管理员获取正确的访问码'; return; }
  errorEl.textContent = '';
  localStorage.setItem('login_code', code);
  logUsage(sp);
  enterProvider(sp);
}

function doLogout() {
  localStorage.removeItem('login_code');
  currentProvider = null;
  currentStores = [];
  attackTargets = new Map();
  document.getElementById('dash').classList.remove('active');
  document.getElementById('loginWrap').style.display = '';
  document.getElementById('loginInput').value = '';
  document.getElementById('loginError').textContent = '';
}

async function enterProvider(sp) {
  currentProvider = sp;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('dash').classList.add('active');

  document.getElementById('storeList').innerHTML = '<div class="loading">加载门店数据...</div>';
  try {
    const resp = await fetch(`data/providers/${encodeURIComponent(sp.id)}.json?v=2`);
    currentStores = await resp.json();
    currentStores.forEach(s => {
      s.g = s.g || 0; s.dp = s.dp || 0; s.se = s.se || 0; s.sc = s.sc || 0;
      s.tr = s.tr || 0; s.cr = s.cr || 0; s.ag = s.ag || 0; s.pa = s.pa || 0;
      s.nc = s.nc || 0; s.ad = s.ad || 0; s.as = s.as || 0;
      s.rp = s.rp || []; s.rb = s.rb || '—'; s.rr = s.rr || '—';
      s.sx = s.sx || ''; s.ox = s.ox || ''; s.ka = s.ka || '';
      s.te = s.te || false; s.p = s.p || '';
    });
    // Default sort: P0 first, then P1, then by L1 priority
    const pOrder = { P0: 0, P1: 1 };
    currentStores.sort((a, b) => {
      const pa = pOrder[a.p] ?? 2, pb = pOrder[b.p] ?? 2;
      if (pa !== pb) return pa - pb;
      return (L1_PRIORITY[a.l1] || 9) - (L1_PRIORITY[b.l1] || 9);
    });
    // Compute per-provider GMV percentiles for relative labeling
    const gmvValues = currentStores.map(s => s.g).filter(v => v > 0).sort((a,b) => a - b);
    if (gmvValues.length > 0) {
      const p33 = gmvValues[Math.floor(gmvValues.length * 0.33)] || 0;
      const p66 = gmvValues[Math.floor(gmvValues.length * 0.66)] || 0;
      window._gmvThresholds = { low: p33, high: p66 };
    } else {
      window._gmvThresholds = { low: 0, high: 0 };
    }
    activeFilters = { l1: null, l2: null, xiaoer: '', priority: null, dingzhan: null, storeId: '', merchantPid: '' };
    currentSort = { field: null, dir: null };
    currentPage = 0;
    attackTargets = new Map();
    restoreAttackForProvider();
    renderDashboard();
    renderStoreList();
  } catch (e) {
    document.getElementById('storeList').innerHTML = '<div class="empty">门店数据加载失败</div>';
    console.error(e);
  }
}

function renderDashboard() {
  const sp = currentProvider;
  // Always compute full xiaoer set for dropdown (unfiltered)
  const xiaoerSet = new Set();
  currentStores.forEach(s => { if (s.sx) xiaoerSet.add(s.sx); });

  // Compute distributions and stats based on xiaoer filter
  const xiaoerFiltered = activeFilters.xiaoer
    ? currentStores.filter(s => s.sx === activeFilters.xiaoer)
    : currentStores;

  const l1Dist = {};
  const l2Dist = {};
  let totalGmv = 0, totalAdSpend = 0, adActive = 0, p0Count = 0, p1Count = 0;
  xiaoerFiltered.forEach(s => {
    l1Dist[s.l1] = (l1Dist[s.l1] || 0) + 1;
    l2Dist[s.l2] = (l2Dist[s.l2] || 0) + 1;
    totalGmv += s.g;
    totalAdSpend += s.as;
    if (s.ad > 0) adActive++;
    if (s.p === 'P0') p0Count++;
    if (s.p === 'P1') p1Count++;

  const baseCount = xiaoerFiltered.length;

  // Stats
  document.getElementById('statRow').innerHTML = `
    <div class="stat-card" style="grid-column:span 2;"><div class="label">当前服务商</div><div class="value" style="font-size:16px;color:var(--blue);">${escHtml(currentProvider.name)}</div><div class="sub">访问码：${currentProvider.code}${activeFilters.xiaoer ? ' · 签约小二：' + escHtml(activeFilters.xiaoer) : ''}</div></div>
    <div class="stat-card"><div class="label">门店总数</div><div class="value">${baseCount}</div>${activeFilters.xiaoer ? '<div class="sub">该小二名下</div>' : ''}</div>
    <div class="stat-card" style="border-color:#FECACA;"><div class="label" style="color:var(--red);">🔴 P0·高优</div><div class="value" style="color:var(--red)">${p0Count}</div><div class="sub">占比 ${baseCount ? (p0Count/baseCount*100).toFixed(1) : 0}%</div></div>
    <div class="stat-card" style="border-color:#FED7AA;"><div class="label" style="color:var(--orange);">🟠 P1·重点</div><div class="value" style="color:var(--orange)">${p1Count}</div><div class="sub">占比 ${baseCount ? (p1Count/baseCount*100).toFixed(1) : 0}%</div></div>
    <div class="stat-card"><div class="label">广告在投</div><div class="value" style="color:var(--blue)">${adActive}</div><div class="sub">占比 ${baseCount ? (adActive/baseCount*100).toFixed(1) : 0}%</div></div>
    <div class="stat-card"><div class="label">小二人数</div><div class="value">${xiaoerSet.size}</div></div>
  `;

  // Filters
  const l1Chips = Object.entries(l1Dist).sort((a,b) => (L1_PRIORITY[a[0]]||9) - (L1_PRIORITY[b[0]]||9))
    .map(([k,v]) => `<div class="filter-chip ${activeFilters.l1===k?'active':''}" data-l1="${k}" style="${activeFilters.l1===k?'background:'+L1_COLORS[k]+';border-color:'+L1_COLORS[k]:''}">
      ${L1_LABELS[k]}<span class="count">${v}</span></div>`).join('');
  const l2Chips = Object.entries(l2Dist).sort((a,b) => b[1]-a[1]).slice(0,6)
    .map(([k,v]) => `<div class="filter-chip ${activeFilters.l2===k?'active':''}" data-l2="${k}">
      ${L2_LABELS[k]||k}<span class="count">${v}</span></div>`).join('');

  // Count 顶展 eligible stores
  let dzCount = 0;
  xiaoerFiltered.forEach(s => { if (getDingzhanForStore(s)) dzCount++; });

  // Priority chips
  const priorityChips = `
    <div class="filter-chip ${activeFilters.priority==='P0'?'active':''}" data-p="P0" style="${activeFilters.priority==='P0'?'background:var(--red);border-color:var(--red);color:#fff;':''}">
      🔴 P0·高优<span class="count">${p0Count}</span></div>
    <div class="filter-chip ${activeFilters.priority==='P1'?'active':''}" data-p="P1" style="${activeFilters.priority==='P1'?'background:var(--orange);border-color:var(--orange);color:#fff;':''}">
      🟠 P1·重点<span class="count">${p1Count}</span></div>
    <div class="filter-chip ${activeFilters.dingzhan?'active':''}" data-dz="1" style="${activeFilters.dingzhan?'background:var(--purple);border-color:var(--purple);color:#fff;':''}">
      👑 顶展机会<span class="count">${dzCount}</span></div>
  `;

  const xiaoerOpts = [...xiaoerSet].sort().map(x => `<option value="${escHtml(x)}">${escHtml(x)}</option>`).join('');

  // Build legend items for visible L1 and L2 tags
  const l1Legend = Object.keys(l1Dist).sort((a,b) => (L1_PRIORITY[a]||9) - (L1_PRIORITY[b]||9))
    .map(k => `<div class="legend-item"><span class="ltag" style="background:${L1_COLORS[k]};color:#fff;">${L1_LABELS[k]}</span><span class="ldesc">${L1_DESC[k]||''}</span></div>`).join('');

    .map(k => `<div class="legend-item"><span class="ltag" style="color:${L2_COLORS[k]};border:1px solid ${L2_COLORS[k]}40;background:#fff;">${L2_LABELS[k]||k}</span><span class="ldesc">${L2_DESC[k]||''}</span></div>`).join('');

  document.getElementById('filterBar').innerHTML = `

    <span style="color:var(--g300);font-size:11px;margin:0 2px;">|</span>

    legendEl.id = 'legendPanel';

    document.getElementById('filterBar').after(legendEl);

  legendEl.innerHTML = `
    <h4>广告高优作业标签</h4>
    <div class="legend-grid">
      <div class="legend-item"><span class="ltag" style="background:var(--red);color:#fff;">P0·高优</span><span class="ldesc">评分前15%。GMV高(30分)+曝光大(20分)+转化强(15分)=最优先作业</span></div>
      <div class="legend-item"><span class="ltag" style="background:var(--orange);color:#fff;">P1·重点</span><span class="ldesc">排名15%-35%。有数据基础，针对性沟通可转化</span></div>
    </div>
    <h4 style="margin-top:12px;">数据状态标签（L1）</h4>
    <div class="legend-grid">${l1Legend}</div>
    <h4 style="margin-top:12px;">业务画像标签（L2）</h4>
    <div class="legend-grid">${l2Legend}</div>
  `;
  // Bind filter events
  document.querySelectorAll('[data-p]').forEach(el => el.addEventListener('click', () => {
    activeFilters.priority = activeFilters.priority === el.dataset.p ? null : el.dataset.p;
    currentPage = 0;
    renderDashboard(); renderStoreList();
  }));
  document.querySelectorAll('[data-dz]').forEach(el => el.addEventListener('click', () => {

  }));
  document.querySelectorAll('[data-l2]').forEach(el => el.addEventListener('click', () => {
    activeFilters.l2 = activeFilters.l2 === el.dataset.l2 ? null : el.dataset.l2;

    renderDashboard(); renderStoreList();

    activeFilters.xiaoer = e.target.value;

function renderStoreList() {
  filteredStores = currentStores.filter(s => {
    if (activeFilters.priority && s.p !== activeFilters.priority) return false;
    if (activeFilters.dingzhan && !getDingzhanForStore(s)) return false;
    if (activeFilters.l1 && s.l1 !== activeFilters.l1) return false;
    if (activeFilters.l2 && s.l2 !== activeFilters.l2) return false;
    if (activeFilters.xiaoer && s.sx !== activeFilters.xiaoer) return false;
    if (activeFilters.storeId && !(s.i || '').includes(activeFilters.storeId)) return false;
    if (activeFilters.merchantPid && !(s.pid || '').includes(activeFilters.merchantPid)) return false;
    return true;
  });

  // Apply sorting
  if (currentSort.field) {
    const dir = currentSort.dir === 'asc' ? 1 : -1;
    filteredStores.sort((a, b) => (a[currentSort.field] - b[currentSort.field]) * dir);
  }

  const totalPages = Math.max(1, Math.ceil(filteredStores.length / PAGE_SIZE));
  if (currentPage >= totalPages) currentPage = totalPages - 1;
  if (currentPage < 0) currentPage = 0;
  const start = currentPage * PAGE_SIZE;
  const pageStores = filteredStores.slice(start, start + PAGE_SIZE);

  // Sort icon helpers
  const gmvIcon = currentSort.field === 'g' ? (currentSort.dir === 'asc' ? '▲' : '▼') : '⇅';
  const pvIcon = currentSort.field === 'se' ? (currentSort.dir === 'asc' ? '▲' : '▼') : '⇅';
  const gmvActive = currentSort.field === 'g' ? ' active' : '';
  const pvActive = currentSort.field === 'se' ? ' active' : '';

  const list = document.getElementById('storeList');
  list.innerHTML = `
    <div class="store-toolbar">
      <div class="info">共 <strong>${filteredStores.length}</strong> 家门店${activeFilters.l1 || activeFilters.l2 || activeFilters.xiaoer || activeFilters.priority || activeFilters.dingzhan || activeFilters.storeId || activeFilters.merchantPid ? '（已筛选）' : ''}${currentSort.field ? '（已排序）' : ''}</div>
      <div class="actions">
        ${currentSort.field ? '<button class="btn btn-outline btn-sm" onclick="clearSort()">✕ 取消排序</button>' : ''}
        ${(activeFilters.storeId || activeFilters.merchantPid) ? '<button class="btn btn-outline btn-sm" onclick="clearSearch()">✕ 清除搜索</button>' : ''}
        <button class="btn btn-outline btn-sm" onclick="exportAllStores()">📥 导出全量门店</button>
      </div>
    </div>
    <div class="search-bar">
      <div class="search-box">
        <label>门店ID</label>
        <input type="text" class="search-input" id="searchStoreId" placeholder="输入门店ID搜索..." value="${activeFilters.storeId}" oninput="onSearchInput('storeId', this.value)">
      </div>
      <div class="search-box">
        <label>商户PID</label>
        <input type="text" class="search-input" id="searchMerchantPid" placeholder="输入商户PID搜索..." value="${activeFilters.merchantPid}" oninput="onSearchInput('merchantPid', this.value)">
      </div>
    </div>
    <div class="store-header">
      <div></div><div>门店名称</div><div>画像</div><div>业务画像</div>
      <div><span class="sortable${gmvActive}" onclick="toggleSort('g')">GMV <span class="sort-icon">${gmvIcon}</span></span></div>
      <div><span class="sortable${pvActive}" onclick="toggleSort('se')">搜索曝光PV <span class="sort-icon">${pvIcon}</span></span></div>
      <div>在投</div>
    </div>
    ${filteredStores.length === 0 ? '<div class="empty">无匹配门店</div>' : ''}
    ${pageStores.map((s, i) => {
      const globalIdx = start + i;
      const checked = attackTargets.has(s.i) ? 'checked' : '';
      const kaTag = (s.ka === 'SKA' || s.ka === 'KA') ? `<span class="tag tag-ka">${s.ka}</span>` : '';
      const pTag = s.p ? `<span class="tag" style="background:${PRIORITY_COLORS[s.p]};color:#fff;font-size:9px;padding:0 5px;margin-right:3px;">${s.p}</span>` : '';
      const dzInfo = getDingzhanForStore(s);
      const dzTag = dzInfo ? `<span class="tag" style="background:var(--purple-bg);color:var(--purple);border:1px solid #DDD6FE;font-size:9px;padding:0 5px;margin-right:3px;">👑顶展${dzInfo.available.length}类可抢</span>` : '';
      const assignTag = attackTargets.has(s.i) && attackTargets.get(s.i)._assigned ? '<span class="assign-label">上级指派</span>' : '';
      const dormantClass = s.l1 === 'dormant' ? ' store-dormant' : '';
      return `<div class="store-row${dormantClass}" data-idx="${globalIdx}">
        <input type="checkbox" class="cb" data-sid="${s.i}" ${checked} onclick="event.stopPropagation();toggleAttack('${s.i}')">
        <div class="store-name">${pTag}${dzTag}${escHtml(s.n)}<span class="cat">${s.c2}</span> ${kaTag}${assignTag}</div>
        <div><span class="tag tag-l1" style="background:${L1_COLORS[s.l1]}">${L1_LABELS[s.l1]}</span></div>
        <div><span class="tag tag-l2" style="color:${L2_COLORS[s.l2]};border-color:${L2_COLORS[s.l2]}30">${L2_LABELS[s.l2]||s.l2}</span></div>
        <div class="gmv-cell">${gmvLabel(s.g)}</div>
        <div class="pv-cell">${s.se > 0 ? fmtNum(s.se) : '—'}</div>
        <div class="ad-cell">${s.ad > 0 ? s.ad+'天' : '—'}</div>
      </div>`;
    }).join('')}
    ${filteredStores.length > PAGE_SIZE ? `
    <div class="pager">
      <button class="pg-btn" onclick="goPage(0)" ${currentPage===0?'disabled':''}>首页</button>
      <button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>上一页</button>
      <div class="pg-info">第 ${currentPage+1} / ${totalPages} 页</div>
      <button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages-1?'disabled':''}>下一页</button>
      <button class="pg-btn" onclick="goPage(${totalPages-1})" ${currentPage>=totalPages-1?'disabled':''}>末页</button>
    </div>` : ''}
  `;

  // Click row to show detail
  list.querySelectorAll('.store-row').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('cb')) return;
      const idx = parseInt(el.dataset.idx);
      showStoreDetail(filteredStores[idx]);
    });
  });
  renderAttackPanel();
}

function goPage(p) {
  currentPage = p;
  renderStoreList();
  document.getElementById('storeList').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleSort(field) {
  if (currentSort.field === field) {
    currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    currentSort = { field, dir: 'desc' }; // Default to high→low
  }
  currentPage = 0;
  renderStoreList();
}

function clearSort() {
  currentSort = { field: null, dir: null };
  currentPage = 0;
  renderStoreList();
}

let _searchTimer = null;
function onSearchInput(field, value) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    activeFilters[field] = value.trim();
    currentPage = 0;
    renderStoreList();
  }, 300);
}

function clearSearch() {
  activeFilters.storeId = '';
  activeFilters.merchantPid = '';
  currentPage = 0;
  renderStoreList();
}

function exportOnePager() {
  const modalBody = document.querySelector('.modal-body');
  if (!modalBody) return;
  const btn = document.querySelector('.export-bar .btn');
  btn.textContent = '⏳ 生成中...';
  btn.disabled = true;
  // Clone and remove excluded sections
  const clone = modalBody.cloneNode(true);
  clone.querySelectorAll('.no-export, .export-bar').forEach(el => el.remove());
  // Temporarily append clone offscreen for rendering
  clone.style.position = 'absolute';
  clone.style.left = '-9999px';
  clone.style.width = modalBody.offsetWidth + 'px';
  clone.style.background = '#fff';
  document.body.appendChild(clone);
  html2canvas(clone, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#ffffff',
    logging: false
  }).then(canvas => {
    document.body.removeChild(clone);
    const link = document.createElement('a');
    link.download = `售卖方案_${currentProvider?.name||''}_${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.textContent = '📷 下载方案图片';
    btn.disabled = false;
  }).catch(e => {
    document.body.removeChild(clone);
    console.error('Export failed:', e);
    btn.textContent = '❌ 导出失败，请重试';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '📷 下载方案图片'; }, 2000);
  });
}

function exportAllStores() {
  if (filteredStores.length === 0) return;
  const headers = ['门店名称','城市','区县','二级类目','kaska','数据状态','业务画像','搜索曝光','搜索点击','详情页PV','推荐产品','推荐摘要','签约小二','运维小二'];
  const rows = filteredStores.map(s => [
    s.n, s.ct, s.dt, s.c2, s.ka||'', L1_LABELS[s.l1], L2_LABELS[s.l2]||s.l2,
    s.se, s.sc, s.dp,
    (s.rp||[]).join('+'), s.rs||'', s.sx||'', s.ox||''
  ]);
  let csv = '\uFEFF' + headers.join(',') + '\n' + rows.map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${currentProvider?.name||'门店'}_全量_${filteredStores.length}家_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function showStoreDetail(s) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  const scriptT = SCRIPT_TEMPLATES[s.l2] || SCRIPT_TEMPLATES.default;

          ${diagPoints.map(p => `<li style="--dot-color:${l2Color}"><span style="position:absolute;left:0;top:10px;width:6px;height:6px;border-radius:50%;background:${l2Color};display:block;"></span>${p}</li>`).join('')}

      <!-- B2. 备选方案 -->
      ${pc && pc.altPlan ? `
      <div class="alt-plan">
        <span class="alt-tag">备选 · ${escHtml(pc.altPlan.label)}</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;">
          ${pc.altPlan.products.map(p => `<div class="rec-prod">${p}</div>`).join('<span style="color:var(--g300);font-weight:300;font-size:16px;">+</span>')}

      <!-- 顶展可售机会 -->
      ${(() => {
        const dz = getDingzhanForStore(s);
        if (!dz) return '';
        return `

        <h3 style="font-size:14px;font-weight:700;color:var(--purple);margin-bottom:8px;">👑 顶展机会 · ${dz.city}</h3>
        <p style="font-size:12px;color:var(--g600);margin-bottom:8px;">该城市当前品类有 <strong style="color:var(--purple);">${dz.available.length}</strong> 个顶展词包可抢，一城一类仅一家独占。</p>

          ${dz.available.map(c => `<span style="background:#fff;border:1px solid #DDD6FE;border-radius:4px;padding:2px 8px;font-size:11px;color:var(--purple);font-weight:600;">${c === '本地中餐_1' ? '本地中餐' : c}</span>`).join('')}

        </div>

      })()}

      <!-- E. 同品类案例参考 (moved before scripts) -->
      ${getCasesForStore(s).length > 0 ? `
      <div class="case-section">
        <h3>📊 同品类成功案例</h3>
        <div class="case-grid">
          ${getCasesForStore(s).map(c => `
          <div class="case-card">
            <div class="case-hd">
              <span class="case-city">${c.city}·${c.subcat}</span>
              ${c.score !== '—' ? `<span class="case-score">${c.score}</span>` : ''}
            </div>
            <div class="case-products">${c.products}</div>
            <div class="case-highlight">${c.highlight}</div>
            <div class="case-metrics">
              ${c.roi !== '—' ? `<span class="case-metric">ROI ${c.roi}</span>` : ''}
              ${c.gmv !== '—' ? `<span class="case-metric">${c.gmv}</span>` : ''}
              ${c.visit ? `<span class="case-metric">${c.visit}</span>` : ''}
            </div>

        </div>
      </div>` : ''}

      <!-- Export bar (captures everything above except no-export sections) -->
      <div class="export-bar">
        <button class="btn btn-primary btn-sm" onclick="exportOnePager()">📷 下载方案图片</button>

      <!-- Unified 销售话术 section (merged: profile scripts + real scripts, no-export) -->
      ${s.rp.length > 0 ? (() => {
        const scripts = getScriptsForStore(s);
        const dataAmmoText = pc && pc.dataAmmo ? (typeof pc.dataAmmo === 'function' ? pc.dataAmmo(s) : pc.dataAmmo) : '';
        return `
      <div class="case-section no-export">
        <h3>💬 销售话术 <span style="font-size:11px;color:var(--g400);font-weight:400;">（${L2_LABELS[s.l2]||''}画像 · ${scripts.catName}品类）</span></h3>
        <div style="display:grid;grid-template-columns:1fr;gap:8px;">
          <!-- 开场 -->
          <div style="background:var(--blue-bg);border:1px solid #BFDBFE;border-radius:var(--r-sm);padding:10px 12px;">
            <div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:6px;">🔓 开场 · 破冰</div>
            <div style="font-size:12px;color:var(--g700);margin-bottom:6px;line-height:1.7;padding:6px 10px;background:#fff;border-radius:6px;border-left:3px solid var(--blue);"><span style="font-weight:600;color:var(--blue);font-size:10px;">画像专属</span> ${openScript}</div>
            ${scripts.open.map(o => `<div style="font-size:12px;color:var(--g700);margin-bottom:4px;line-height:1.6;"><span style="font-weight:600;color:var(--g500);">[${o.label}]</span> ${o.text}</div>`).join('')}
          </div>
          <!-- 促单 -->
          <div style="background:var(--orange-bg);border:1px solid #FED7AA;border-radius:var(--r-sm);padding:10px 12px;">
            <div style="font-size:11px;font-weight:700;color:var(--orange);margin-bottom:6px;">🎯 促单 · 收尾</div>
            <div style="font-size:12px;color:var(--g700);margin-bottom:6px;line-height:1.7;padding:6px 10px;background:#fff;border-radius:6px;border-left:3px solid var(--orange);"><span style="font-weight:600;color:var(--orange);font-size:10px;">画像专属</span> ${closeScript}</div>
            ${scripts.close.map(c => `<div style="font-size:12px;color:var(--g700);margin-bottom:4px;line-height:1.6;"><span style="font-weight:600;color:var(--g500);">[${c.label}]</span> ${c.text}</div>`).join('')}
          </div>
          <!-- 数据弹药 -->
          ${dataAmmoText ? `<div style="background:var(--green-bg);border:1px solid #A7F3D0;border-radius:var(--r-sm);padding:10px 12px;">
            <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:6px;">📊 数据弹药</div>
            <div style="font-size:12px;color:var(--g700);line-height:1.7;padding:6px 10px;background:#fff;border-radius:6px;border-left:3px solid var(--green);">${dataAmmoText}</div>
          </div>` : ''}
          <!-- 异议应对 -->
          <div style="background:var(--red-bg);border:1px solid #FECACA;border-radius:var(--r-sm);padding:10px 12px;">
            <div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:6px;">🛡️ 异议应对</div>
            <div style="font-size:12px;color:var(--g700);margin-bottom:6px;line-height:1.7;padding:6px 10px;background:#fff;border-radius:6px;border-left:3px solid var(--red);"><span style="font-weight:600;color:var(--red);font-size:10px;">画像专属</span> ${objScript}</div>
            ${scripts.obj.map(o => `<div style="font-size:12px;color:var(--g700);margin-bottom:4px;line-height:1.6;"><span style="font-weight:600;color:var(--g500);">[${o.label}]</span> ${o.response}</div>`).join('')}

      </div>` : ''}

      <!-- Extra metrics -->
      <div style="background:var(--g50);border-radius:8px;padding:12px;font-size:12px;color:var(--g500);">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;">
          <div>签约小二：${escHtml(s.sx||'')}</div>

    </div>
  `;
  overlay.classList.add('show');
}

// ═══════════════════════════════════════════
// Attack Targets
// ═══════════════════════════════════════════
function toggleAttack(sid) {
  if (attackTargets.has(sid)) {
    attackTargets.delete(sid);
  } else {
    const s = currentStores.find(st => st.i === sid);
    if (s) attackTargets.set(sid, s);
  }
  saveAttackToStorage();
  renderAttackPanel();
  // Update checkbox
  document.querySelectorAll(`[data-sid="${sid}"]`).forEach(cb => cb.checked = attackTargets.has(sid));
}

function renderAttackPanel() {
  const body = document.getElementById('attackBody');
  document.getElementById('attackCount').textContent = attackTargets.size;
  if (attackTargets.size === 0) {
    body.innerHTML = '<div class="empty" style="padding:10px 0;">勾选门店添加到攻坚清单</div>';
    return;
  }
  const items = [...attackTargets.values()];
  let totalEstRev = 0;
  items.forEach(s => {
    if (s.rp.length > 0) {
      if (s.rp.includes('获客宝')) totalEstRev += 5000;
      if (s.rp.includes('品牌智能体')) totalEstRev += 1188;
      if (s.rp.includes('效果广告')) totalEstRev += 3000;
    }
  });

  body.innerHTML = `
    ${items.map(s => `<div class="attack-item">
      <div>
        <span style="font-weight:600;">${escHtml(s.n)}</span>
        <span class="tag tag-l1" style="background:${L1_COLORS[s.l1]};font-size:9px;padding:0 5px;margin-left:4px;">${L1_LABELS[s.l1]}</span>
        ${s._assigned ? '<span class="assign-label">上级指派</span>' : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:11px;color:var(--g500);">${s.rp.length > 0 ? s.rp.join('+') : '暂不推荐'}</span>
        <span class="remove" onclick="toggleAttack('${s.i}')">移除</span>
      </div>
    </div>`).join('')}
    <div class="attack-summary">
      <span>已选 ${items.length} 家攻坚目标</span>
      <span>预估月增广告收入 <strong style="color:var(--blue);">¥${fmtNum(totalEstRev)}</strong></span>
    </div>
    <div class="attack-actions">
      <button class="btn btn-primary btn-sm" onclick="exportAttackExcel()">导出Excel</button>
      <button class="btn btn-outline btn-sm" onclick="autoSelectRecommended()">一键全选推荐</button>
      <button class="btn btn-outline btn-sm" onclick="clearAttack()">清空</button>
    </div>
  `;
}

function autoSelectRecommended() {
  const recommended = currentStores
    .filter(s => s.l1 !== 'dormant')
    .sort((a, b) => (L1_PRIORITY[a.l1]||9) - (L1_PRIORITY[b.l1]||9))
    .slice(0, 10);
  recommended.forEach(s => attackTargets.set(s.i, s));
  saveAttackToStorage();
  renderStoreList();
  renderAttackPanel();
}

function clearAttack() {
  attackTargets.clear();
  saveAttackToStorage();
  renderStoreList();
  renderAttackPanel();
}

function saveAttackToStorage() {
  try {
    const key = `attack_${currentProvider?.id || 'global'}`;
    const data = [...attackTargets.entries()].map(([id, s]) => ({ id, assigned: s._assigned }));
    localStorage.setItem(key, JSON.stringify(data));
  } catch (e) { /* localStorage full */ }
}

function loadAttackFromStorage() {
  // Will be loaded after provider is selected
}

function restoreAttackForProvider() {
  try {
    const key = `attack_${currentProvider?.id || 'global'}`;
    const saved = JSON.parse(localStorage.getItem(key) || '[]');
    saved.forEach(({ id }) => {
      const s = currentStores.find(st => st.i === id);
      if (s) attackTargets.set(id, s);
    });
  } catch (e) { /* ignore */ }
}

function exportAttackExcel() {
  const items = [...attackTargets.values()];
  if (items.length === 0) return;
  const headers = ['门店名称', '城市', '二级类目', 'kaska', '数据状态', '业务画像', '搜索曝光', '推荐产品', '推荐摘要', '签约小二', '运维小二'];
  const rows = items.map(s => [s.n, s.ct, s.c2, s.ka, L1_LABELS[s.l1], L2_LABELS[s.l2]||s.l2, s.se, s.rp.join('+'), s.rs, s.sx, s.ox]);
  let csv = '\uFEFF' + headers.join(',') + '\n' + rows.map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `攻坚清单_${currentProvider?.name || ''}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ═══════════════════════════════════════════
// Event Bindings
// ═══════════════════════════════════════════
document.getElementById('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

document.getElementById('backBtn').addEventListener('click', doLogout);

document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('show'));
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('show'); });

document.getElementById('attackToggle').addEventListener('click', () => {
  document.getElementById('attackPanel').classList.toggle('open');
  document.getElementById('attackArrow').textContent = document.getElementById('attackPanel').classList.contains('open') ? '▼' : '▲';
});

// Init - robust with retry + auto-login
async function doInit() {
  const loginInput = document.getElementById('loginInput');
  if (!loginInput) { setTimeout(doInit, 100); return; }
  let retries = 3;
  while (retries > 0) {
    try {
      const resp = await fetch('data/index.json?v=2');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      providerIndex = await resp.json();
      // Check saved login
      const savedCode = localStorage.getItem('login_code');
      if (savedCode) {
        const sp = providerIndex.find(p => p.code === savedCode);
        if (sp) { logUsage(sp); enterProvider(sp); return; }
      }
      loginInput.focus();
      return;
    } catch (e) {
      retries--;
      console.error('Init attempt failed, retries left:', retries, e);
      if (retries > 0) await new Promise(r => setTimeout(r, 1000));
    }
  }
  document.getElementById('loginError').textContent = '数据加载失败，请刷新页面重试';
}
doInit();
